<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mach Mukke - Musikwünsche</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wish-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-group { display: flex; gap: 1rem; }
        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }
        input[type="text"]:focus {
            box-shadow: 0 0 0 2px #e94560;
        }
        input[type="text"]::placeholder { color: #888; }
        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .wishes-list { margin-top: 2rem; }
        .wishes-list h2 { margin-bottom: 1rem; font-size: 1.5rem; }
        .wish-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .wish-query { font-weight: 500; }
        .wish-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-queued { background: #f59e0b33; color: #f59e0b; }
        .status-downloading { background: #3b82f633; color: #3b82f6; }
        .status-done { background: #10b98133; color: #10b981; }
        .status-failed { background: #ef444433; color: #ef4444; }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 2rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mach Mukke</h1>
        <div class="wish-form">
            <form id="wishForm">
                <div class="input-group">
                    <input type="text" id="query" placeholder="Song oder Kunstler eingeben..." required autocomplete="off">
                    <button type="submit" id="submitBtn">Wunsch</button>
                </div>
            </form>
        </div>
        <div class="wishes-list">
            <h2>Wünsche</h2>
            <div id="wishesContainer">
                <p class="empty-state">Noch keine Wünsche. Sei der Erste!</p>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const form = document.getElementById('wishForm');
        const queryInput = document.getElementById('query');
        const submitBtn = document.getElementById('submitBtn');
        const wishesContainer = document.getElementById('wishesContainer');
        const toast = document.getElementById('toast');

        let wishes = {};

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '...';

            try {
                const res = await fetch('/api/wish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });
                const data = await res.json();
                wishes[data.id] = data;
                showToast(`"${query}" wurde gewunschen!`);
                queryInput.value = '';
                renderWishes();
            } catch (err) {
                showToast('Fehler beim Senden!', true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Wunsch';
            }
        });

        async function refreshWishes() {
            try {
                const res = await fetch('/api/wishes');
                const data = await res.json();
                for (const wish of data) {
                    wishes[wish.id] = wish;
                }
                renderWishes();
            } catch (err) {
                console.error('Failed to refresh wishes:', err);
            }
        }

        function renderWishes() {
            const items = Object.values(wishes).sort((a, b) => {
                const order = { queued: 0, downloading: 1, done: 2, failed: 3 };
                return (order[a.status] ?? 4) - (order[b.status] ?? 4);
            });

            if (items.length === 0) {
                wishesContainer.innerHTML = '<p class="empty-state">Noch keine Wünsche. Sei der Erste!</p>';
                return;
            }

            wishesContainer.innerHTML = items.map(wish => `
                <div class="wish-item">
                    <span class="wish-query">${escapeHtml(wish.query)}</span>
                    <span class="wish-status status-${wish.status}">${getStatusText(wish.status)}</span>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const texts = { queued: 'Warteschlange', downloading: 'Download...', done: 'Fertig', failed: 'Fehlgeschlagen' };
            return texts[status] || status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        setInterval(refreshWishes, 2000);
        refreshWishes();
    </script>
</body>
</html>
