<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mach Mukke - Musikwünsche</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-form, .wish-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-form h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            color: #ff6b6b;
        }
        .login-field {
            margin-bottom: 1rem;
        }
        .login-field label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        .login-field input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }
        .login-field input:focus {
            box-shadow: 0 0 0 2px #e94560;
        }
        .login-field input::placeholder { color: #888; }
        .login-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-group { display: flex; gap: 1rem; }
        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }
        input[type="text"]:focus {
            box-shadow: 0 0 0 2px #e94560;
        }
        input[type="text"]::placeholder { color: #888; }
        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .wishes-list { margin-top: 2rem; }
        .wishes-list h2 { margin-bottom: 1rem; font-size: 1.5rem; }
        .wish-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .wish-query { font-weight: 500; }
        .wish-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-queued { background: #f59e0b33; color: #f59e0b; }
        .status-downloading { background: #3b82f633; color: #3b82f6; }
        .status-done { background: #10b98133; color: #10b981; }
        .status-failed { background: #ef444433; color: #ef4444; }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 2rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mach Mukke</h1>
        <div class="login-form" id="loginForm">
            <h2>Erst ein paar Fragen...</h2>
            <div class="login-field">
                <label for="loginName">Wie heißt das Geburtstagskind?</label>
                <input type="text" id="loginName" placeholder="Name" required autocomplete="off">
            </div>
            <div class="login-field">
                <label for="loginAge">Wie alt wird das Geburtstagskind?</label>
                <input type="text" id="loginAge" placeholder="Alter" required autocomplete="off">
            </div>
            <button type="button" class="login-btn" id="loginBtn">Anmelden</button>
        </div>
        <div class="wish-form hidden" id="wishFormContainer">
            <form id="wishForm">
                <div class="input-group">
                    <input type="text" id="query" placeholder="Song, Künstler" required autocomplete="off">
                    <button type="submit" id="submitBtn">Wunsch</button>
                </div>
            </form>
        </div>
        <div class="wishes-list hidden" id="wishesList">
            <h2>Wünsche</h2>
            <div id="wishesContainer">
                <p class="empty-state">Noch keine Wünsche. Sei der Erste!</p>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginName = document.getElementById('loginName');
        const loginAge = document.getElementById('loginAge');
        const loginBtn = document.getElementById('loginBtn');
        const wishFormContainer = document.getElementById('wishFormContainer');
        const wishForm = document.getElementById('wishForm');
        const queryInput = document.getElementById('query');
        const submitBtn = document.getElementById('submitBtn');
        const wishesContainer = document.getElementById('wishesContainer');
        const wishesList = document.getElementById('wishesList');
        const toast = document.getElementById('toast');

        let wishes = {};
        let authenticated = false;

        loginBtn.addEventListener('click', async () => {
            const name = loginName.value.trim();
            const age = loginAge.value.trim();
            if (!name || !age) return;

            loginBtn.disabled = true;
            loginBtn.textContent = '...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, age }),
                });
                if (!res.ok) {
                    const data = await res.json();
                    showToast(data.detail || 'Falsche Antwort!', true);
                    return;
                }
                authenticated = true;
                loginForm.classList.add('hidden');
                wishFormContainer.classList.remove('hidden');
                wishesList.classList.remove('hidden');
                refreshWishes();
            } catch (err) {
                showToast('Fehler beim Anmelden!', true);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Anmelden';
            }
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth');
                if (res.ok) {
                    authenticated = true;
                    loginForm.classList.add('hidden');
                    wishFormContainer.classList.remove('hidden');
                    wishesList.classList.remove('hidden');
                    refreshWishes();
                }
            } catch (err) {}
        }

        wishForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '...';

            try {
                const res = await fetch('/api/wish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });
                if (!res.ok) {
                    const data = await res.json();
                    showToast(data.detail || 'Fehler!', true);
                    return;
                }
                const data = await res.json();
                wishes[data.id] = data;
                showToast(`"${query}" wurde gewunschen!`);
                queryInput.value = '';
                renderWishes();
            } catch (err) {
                showToast('Fehler beim Senden!', true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Wunsch';
            }
        });

        async function refreshWishes() {
            try {
                const res = await fetch('/api/wishes');
                const data = await res.json();
                for (const wish of data) {
                    wishes[wish.id] = wish;
                }
                renderWishes();
            } catch (err) {
                console.error('Failed to refresh wishes:', err);
            }
        }

        function renderWishes() {
            const items = Object.values(wishes).sort((a, b) => {
                const order = { queued: 0, downloading: 1, done: 2, failed: 3 };
                return (order[a.status] ?? 4) - (order[b.status] ?? 4);
            });

            if (items.length === 0) {
                wishesContainer.innerHTML = '<p class="empty-state">Noch keine Wünsche. Sei der Erste!</p>';
                return;
            }

            wishesContainer.innerHTML = items.map(wish => `
                <div class="wish-item">
                    <span class="wish-query">${escapeHtml(wish.query)}</span>
                    <span class="wish-status status-${wish.status}">${getStatusText(wish.status)}</span>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const texts = { queued: 'Warteschlange', downloading: 'Download...', done: 'Fertig', failed: 'Fehlgeschlagen' };
            return texts[status] || status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        setInterval(refreshWishes, 2000);
        checkAuth();
    </script>
</body>
</html>
