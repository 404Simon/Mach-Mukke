<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mach Mukke</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 2rem;
      max-width: 620px;
    }
    h1 { margin-top: 0; }
    p { color: #c7ccd1; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Wünsche sind aktuell deaktiviert.</h1>
    <p>Bitte versuch es später nochmal.</p>
  </main>
</body>
</html>
