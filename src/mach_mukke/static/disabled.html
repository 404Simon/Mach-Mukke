<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mach Mukke</title>
  <style>
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: #0f3460;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-repeat: no-repeat;
      color: #e0e0e0;
      text-align: center;
      padding: 2rem;
      overscroll-behavior-y: none;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 2rem;
      max-width: 620px;
      width: min(100%, 620px);
    }
    h1 { margin-top: 0; }
    p { color: #c7ccd1; }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .card {
        padding: 1.25rem;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Wünsche sind aktuell deaktiviert.</h1>
    <p>Bitte versuch es später nochmal.</p>
  </main>
</body>
</html>
